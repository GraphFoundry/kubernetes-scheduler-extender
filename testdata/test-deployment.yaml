apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment
  labels:
    app: test-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      schedulerName: my-scheduler
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
