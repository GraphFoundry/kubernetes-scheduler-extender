apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: default
  labels:
    extender.kubernetes.io/name: payment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
      extender.kubernetes.io/name: payment
  template:
    metadata:
      labels:
        app: payment
        extender.kubernetes.io/name: payment

    spec:
      schedulerName: my-scheduler
      containers:
        - name: payment
          image: curlimages/curl
          command: ["/bin/sh","-c"]
          args:
            - |
              while true; do
                curl -s http://backend.default.svc.cluster.local >/dev/null || true
                sleep 2
              done
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: default
spec:
  selector:
    app: payment
  ports:
    - port: 80
      targetPort: 80


