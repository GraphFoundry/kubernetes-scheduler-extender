apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-extender
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler-extender
  template:
    metadata:
      labels:
        app: scheduler-extender
    spec:
      containers:
        - name: extender
          image: scheduler-extender:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
